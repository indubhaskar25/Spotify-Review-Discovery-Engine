services:
  - type: web
    name: spotify-review-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
      - key: DATA_DIR
        value: /data
      - key: GROQ_API_KEY
        sync: false # Required for AI endpoints (Ask AI, live insight generation).
                    # Without it, the backend starts normally and serves cached/mock data.
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1
